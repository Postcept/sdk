name: Publish

# Publishes to npm on a GitHub release. Uses npm trusted publishing (OIDC), so
# there is no token to store: npm verifies the release came from this workflow and
# attaches a provenance attestation automatically.
on:
  release:
    types: [published]

permissions:
  contents: write # attach the SBOM to the GitHub release
  id-token: write # OIDC, for trusted publishing and provenance
  attestations: write # build-provenance attestation for the published artifact

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run build
      - run: npm run typecheck
      # Software bill of materials (CycloneDX), attached to the release so
      # consumers can see exactly what shipped.
      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > sbom.cyclonedx.json
      - name: Attach SBOM to the release
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cyclonedx.json --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      # --provenance makes npm attach a signed provenance statement linking the
      # tarball to this workflow + commit (verifiable with `npm audit signatures`).
      - run: npm publish --access public --provenance
      # A second, GitHub-native build-provenance attestation over the packed tarball.
      - name: Pack for attestation
        run: |
          mkdir -p dist-pack
          npm pack --pack-destination dist-pack
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist-pack/*.tgz
